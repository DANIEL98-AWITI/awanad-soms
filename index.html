<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWANAD SOMS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0b5ed7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

h1{
    color:#003366;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo">🚢</div>

<h1>AWANAD CFS</h1>

<p>Stevedoring Operations Management System</p>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="alert('Welcome to AWANAD SOMS Prototype')">
LOGIN
</button>

<div class="footer">
Port of Mombasa<br>
© 2026 AWANAD CFS
</div>

</div>

</body>
</html>
