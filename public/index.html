<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWANAD SOMS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#003366,#0059b3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
background:white;
border-radius:15px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h1{
color:#003366;
margin-bottom:5px;
}

h3{
color:#666;
margin-bottom:30px;
font-weight:normal;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#0059b3;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#003366;
}

.footer{
margin-top:25px;
font-size:13px;
color:#777;
}

.version{
margin-top:10px;
font-size:12px;
color:#999;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">🚢</div>

<h1>AWANAD CFS</h1>

<h3>Stevedoring Operations Management System</h3>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="alert('Dashboard Coming Next Module')">

LOGIN

</button>

<div class="footer">

Port of Mombasa

<br>

© 2026 AWANAD CFS

</div>

<div class="version">

Version 0.2 Prototype

</div>

</div>

</body>
</html>
