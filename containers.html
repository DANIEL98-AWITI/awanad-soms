<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Container Operations | AWANAD SOMS</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<header class="top-header">

<div class="logo-section">

<img src="public/images/logo.png" class="logo">

<div>

<h1>AWANAD SOMS</h1>

<p>Container Operations</p>

</div>

</div>

<div class="header-right">

<input
type="text"
id="searchContainer"
class="search-box"
placeholder="Search BL or Container">

<div class="user-box">

🔔

<span>Daniel</span>

</div>

</div>

</header>

<aside class="sidebar">

<h3>MAIN MENU</h3>

<a href="dashboard.html">🏠 Dashboard</a>

<a href="vessels.html">🚢 Vessel Management</a>

<a href="bl.html">📑 BL Register</a>

<a class="active" href="containers.html">📦 Container Operations</a>

<a href="roro.html">🚗 RORO Operations</a>

<a href="invoices.html">💰 Invoice Register</a>

<a href="customers.html">👥 Customers</a>

<a href="reports.html">📊 Reports</a>

<a href="settings.html">⚙ Settings</a>

<a href="index.html">🚪 Logout</a>

</aside>

<main class="content">

<div class="page-title">

<h2>Container Operations</h2>

<button class="action-btn" onclick="openContainerModal()">

➕ Add Container

</button>

</div>

<table>

<thead>

<tr>

<th>BL Number</th>

<th>Vessel</th>

<th>Customer</th>

<th>Shipping Line</th>

<th>Container</th>

<th>Status</th>

</tr>

</thead>

<tbody id="containerTableBody">

</tbody>

</table>

</main>

<div id="containerModal" class="modal">

<div class="modal-content">

<h2>Add Container</h2>

<input type="text" id="containerBL" placeholder="Enter BL Number" onkeyup="fetchBL()">

<input type="text" id="containerVessel" readonly>

<input type="text" id="containerCustomer" readonly>

<input type="text" id="containerShipping" readonly>

<input type="text" id="containerNumber" placeholder="Container Number">

<select id="containerStatus">

<option>Awaiting</option>

<option>Discharging</option>

<option>Evacuating</option>

<option>Completed</option>

</select>

<div class="modal-buttons">

<button class="save-btn" onclick="saveContainer()">

Save

</button>

<button class="cancel-btn" onclick="closeContainerModal()">

Cancel

</button>

</div>

</div>

</div>

<script src="js/containers.js"></script>

</body>

</html>
