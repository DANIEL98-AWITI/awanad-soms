<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWANAD SOMS - Login</title>

<link rel="stylesheet" href="../src/main.css">

<style>

body{
background:#0B3D91;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial;
}

.login-box{

background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.2);

}

input{

width:100%;
padding:12px;
margin-top:15px;
border:1px solid #ddd;
border-radius:8px;

}

button{

width:100%;
padding:12px;
margin-top:20px;
background:#0B3D91;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}

h2{

text-align:center;
color:#0B3D91;

}

</style>

</head>

<body>

<div class="login-box">

<h2>AWANAD SOMS</h2>

<p align="center">Stevedoring Operations Management System</p>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>LOGIN</button>

</div>

</body>

</html>
